<!DOCTYPE html>
<html>

<head>
    <title>ChessRoast</title>
    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='dark_theme.css') }}">
    <link
    rel="stylesheet"
    href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
</head>

<body>

    <h1>ChessRoast 🔥</h1>

    <div class="layout">

        <div class="left-panel">

            <form method="POST">

                <textarea
                    name="pgn"
                    rows="15"
                    cols="70"
                    placeholder="Paste PGN here..."
                ></textarea>

                <br><br>

                <button type="submit">
                    Roast Me
                </button>

            </form>

            <div class="card">

                {% for item in analysis %}

                    <div class="move-entry">

                        <h3>{{ item.move }}</h3>

                        <p>Evaluation: {{ item.eval }}</p>

                    </div>

                {% endfor %}

            </div>

        </div>

        <div class="middle-panel">

            <div class="board-wrapper">
                <div class="eval-container">
                    <div id="eval-black-text">0.0</div>
                    <div id="eval-white">
                        <div id="eval-white-text">0.0</div>
                    </div>
                </div>
                <div id="board" style="width: 700px"></div>
            </div>

            <div class="button-container">
                <button type = "button" class = "button-chessboard" id="back-btn">
                    <img src = "{{ url_for('static', filename='images/left-arrow-cropped.jpg') }}">
                </button>
                <button type = "button" class = "button-chessboard" id="play-btn">
                    <img src = "{{ url_for('static', filename='images/play-button.png') }}">
                </button>
                <button type = "button" class = "button-chessboard" id="next-btn">
                    <img src = "{{ url_for('static', filename='images/right-arrow-cropped.jpg') }}">
                </button>
            </div>
            

        </div>

        <div class = "right-panel">
            <div class="engine-line-card">

                <div id="engline-line-container">
                    <div id="engine-lines">...</div>
                </div>
                    
            </div>

                <div class="opening-container" id="opening-name">
                </div>

            <div class="move-table" id="move-table"></div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script src="{{ url_for('static', filename='js/evalbar.js') }}"></script>

    <script src="{{ url_for('static', filename='js/movetable.js') }}"></script>

    <script>
        

        var moves = {{ moves | tojson }};

        var evals = {{ evals | tojson }};

        var allLines = {{ all_lines | tojson }};

        var game = new Chess();

        var currentMove = 0;

        var sanMoves = {{ san_moves | tojson }};

        var autoplay = null;

        var moveData = {{ move_data | tojson }};

        var openingName = {{ opening_name | tojson }};

        var board = Chessboard('board', {
            draggable: true,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop
        });

        function onDrop(source, target) {

            let move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) {
                return 'snapback';
            }

            currentMove++;

            updateBoard();
        }
        
        function jumpToMove(targetMove) {

            game.reset();

            currentMove = 0;

            for (let i = 0; i < targetMove; i++) {

                let move = moves[i];

                game.move({
                    from: move.slice(0, 2),
                    to: move.slice(2, 4),
                    promotion: 'q'
                });

                currentMove++;
            }

            updateBoard();
            renderMoveTable();
        }

        function updateBoard() {

            board.position(game.fen());

            updateEvalBar();

            renderMoveTable();

            let container = document.getElementById("engine-lines");

            container.innerHTML = "";

            let openingDiv = document.getElementById("opening-name");

            if (currentMove > 0) {

                let currentOpening = moveData[currentMove - 1].opening;

                if (currentOpening) {
                    openingDiv.innerText = "Opening: " + currentOpening;
                } else {
                    openingDiv.innerText = "Opening: Unknown";
                }

                let currentLines = allLines[currentMove - 1];

                currentLines.forEach(function(lineData) {

                    container.innerHTML += `
                        <div class="engine-line">

                            <span class="engine-eval">
                                ${lineData.eval > 0 ? "+" : ""}
                                ${lineData.eval/100}
                            </span>

                            <span class="engine-moves">
                                ${lineData.line}
                            </span>

                        </div>
                    `;
                });
            }
            else {
                openingDiv.innerText = "";
            }
        }

        function nextMove() {

            if (currentMove < moves.length) {

                let move = moves[currentMove];

                game.move({
                    from: move.slice(0, 2),
                    to: move.slice(2, 4),
                    promotion: 'q'
                });

                currentMove++;

                renderMoveTable();

                updateBoard();
            }
        }

        function previousMove() {

            if (currentMove > 0) {

                game.undo();

                currentMove--;

                renderMoveTable();

                updateBoard();
            }
        }

        function togglePlay() {

            if (currentMove >= moves.length) {

                game.reset();

                currentMove = 0;

                renderMoveTable();

                updateBoard();
            }

            if (autoplay === null) {

                autoplay = setInterval(function () {

                    if (currentMove < moves.length) {

                        nextMove();

                    } else {

                        clearInterval(autoplay);

                        autoplay = null;
                    }

                }, 1000);

            } else {

                clearInterval(autoplay);

                autoplay = null;
            }
        }

        document.getElementById("play-btn").onclick = togglePlay;
        document.getElementById("next-btn").onclick = nextMove;
        document.getElementById("back-btn").onclick = previousMove;

        document.addEventListener("keydown", function(event) {

            if (document.activeElement.tagName.toLowerCase() === "textarea") return;

            if (event.code === "ArrowRight") {

                event.preventDefault();

                nextMove();

            } else if (event.code === "ArrowLeft") {

                event.preventDefault();

                previousMove();

            } else if (event.code === "Space") {

                event.preventDefault();

                togglePlay();
            }
        });
        
        window.onload = function () {

            renderMoveTable();

            updateBoard();
        };


    </script>
</body>

</html>
